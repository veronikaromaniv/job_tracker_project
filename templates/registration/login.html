{% extends "base.html" %}

{% block title %}Вхід — JobTracker{% endblock %}

{% block content %}
<style>
    .auth-wrap {
        min-height: 65vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .auth-box {
        width: 100%;
        max-width: 380px;
    }

    .auth-header { margin-bottom: 2rem; }

    .auth-title {
        font-family: 'Manrope', sans-serif;
        font-size: 1.5rem;
        font-weight: 800;
        color: var(--text);
        letter-spacing: -0.03em;
        margin-bottom: 0.3rem;
    }

    .auth-subtitle { color: var(--text-muted); font-size: 0.875rem; }

    .auth-box p { margin-bottom: 1rem; }

    .auth-box label {
        display: block;
        color: var(--text);
        font-size: 0.8rem;
        font-weight: 600;
        margin-bottom: 0.35rem;
    }

    .auth-box input[type="text"],
    .auth-box input[type="password"],
    .auth-box input[type="email"] {
        width: 100%;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text);
        font-family: 'Inter', sans-serif;
        font-size: 0.9rem;
        padding: 0.65rem 0.9rem;
        outline: none;
        transition: border-color 0.15s;
    }

    .auth-box input:focus { border-color: var(--text); }
    .auth-box input::placeholder { color: var(--text-dim); }

    .auth-box ul { list-style: none; padding: 0; margin-top: 0.3rem; }
    .auth-box ul li { font-size: 0.78rem; color: var(--red); }

    .btn-auth {
        width: 100%;
        background: var(--text);
        color: #fff;
        font-family: 'Inter', sans-serif;
        font-weight: 600;
        font-size: 0.9rem;
        padding: 0.7rem;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        transition: opacity 0.15s;
        margin-top: 0.25rem;
    }

    .btn-auth:hover { opacity: 0.85; }

    .auth-divider {
        border: none;
        border-top: 1px solid var(--border);
        margin: 1.5rem 0;
    }

    .auth-footer {
        text-align: center;
        color: var(--text-muted);
        font-size: 0.85rem;
    }

    .auth-footer a { color: var(--text); font-weight: 500; text-decoration: none; }
    .auth-footer a:hover { text-decoration: underline; }

    .btn-google {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.6rem;
        background: var(--bg);
        border: 1px solid var(--border);
        color: var(--text);
        font-family: 'Inter', sans-serif;
        font-weight: 500;
        font-size: 0.9rem;
        padding: 0.65rem;
        border-radius: 8px;
        cursor: pointer;
        text-decoration: none;
        transition: all 0.15s;
        margin-bottom: 1rem;
    }
    .btn-google:hover { border-color: var(--border-dark); background: var(--surface); color: var(--text); }
    .btn-google svg { width: 18px; height: 18px; flex-shrink: 0; }
    .auth-or {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        color: var(--text-dim);
        font-size: 0.78rem;
        margin-bottom: 1rem;
    }
    .auth-or::before, .auth-or::after {
        content: '';
        flex: 1;
        border-top: 1px solid var(--border);
    }
</style>

<div class="auth-wrap">
    <div class="auth-box">
        <div class="auth-header">
            <h1 class="auth-title">Вхід</h1>
            <p class="auth-subtitle">Введи свої дані для входу</p>
        </div>

        {% load socialaccount %}
        <a href="{% provider_login_url 'google' %}" class="btn-google">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Увійти через Google
        </a>

        <div class="auth-or">або</div>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-auth">Увійти</button>
        </form>

        <hr class="auth-divider">

        <div class="auth-footer">
            Немає акаунту? <a href="{% url 'register' %}">Зареєструватися</a>
        </div>
    </div>
</div>
{% endblock %}
